name: CI
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm install
      - name: Typecheck web
        run: npm run -w web typecheck
      - name: Typecheck data
        run: npm run -w data typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Serialize test runs across PRs — the suite resets state on the
    # shared test Supabase project; parallel runs would race.
    concurrency:
      group: test-supabase
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm install
      - name: Run data test suite (against isolated test project)
        env:
          # GitHub repo secrets — populate with the values from
          # data/.env.test (same shape as data/.env.test.example).
          SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
          # Dummy value — the suite never reaches Typesense. It only satisfies the
          # module-load requireEnv("TYPESENSE_COLLECTION") in sync-typesense.ts,
          # which materialize.ts imports transitively. Deliberately NOT a code
          # default: a silent "places" fallback is the cross-env clobber this PR
          # fixes, so the requirement stays enforced and CI supplies the value.
          TYPESENSE_COLLECTION: places_ci
        run: npm run -w data test

  build:
    # The gate that matches production. `next build` catches RSC boundary
    # errors, 'use client' violations, route-type mismatches, and static-gen
    # failures that tsc alone cannot see. A non-zero exit fails the check.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm install
      # No env vars: a clean production build with every .env* absent exits 0.
      # All env access is lazy/runtime-guarded and static generation falls back
      # (e.g. the getAlaskaTrip snapshot). Do NOT stub env here — if a future
      # change makes the build require a var, add it as a repo secret and wire
      # it below rather than faking a value.
      - name: Build web (production gate)
        run: cd web && npx next build
