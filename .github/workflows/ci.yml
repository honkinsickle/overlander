name: CI
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm install
      - name: Typecheck web
        run: npm run -w web typecheck
      - name: Typecheck data
        run: npm run -w data typecheck
